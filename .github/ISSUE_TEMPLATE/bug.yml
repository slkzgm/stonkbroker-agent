name: Bug report
description: Report a reproducible problem that is not a security vulnerability.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include private keys, API keys, OAuth tokens, or unpatched vulnerability details.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node version, operating system, and MCP client.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      render: shell
